<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Хермес</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#070b14; --glass:rgba(255,255,255,.06); --glass-bd:rgba(255,255,255,.12);
    --txt:#eef3fb; --dim:#9fb0c6; --a1:#6d5efc; --a2:#11d3ff; --a3:#ff5ea8;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ background:var(--bg); color:var(--txt); overflow-x:hidden;
    font-family:-apple-system,"SF Pro Display","Segoe UI",Inter,Roboto,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; }
  /* аврора-фон */
  .aurora{ position:fixed; inset:-30% -10% auto; height:70vh; z-index:-2; filter:blur(70px); opacity:.55; }
  .aurora i{ position:absolute; border-radius:50%; }
  .aurora i:nth-child(1){ width:50vw;height:50vw; left:-10vw; top:-10vh; background:var(--a1); animation:f1 14s ease-in-out infinite; }
  .aurora i:nth-child(2){ width:45vw;height:45vw; right:-8vw; top:-6vh; background:var(--a2); animation:f2 16s ease-in-out infinite; }
  .aurora i:nth-child(3){ width:40vw;height:40vw; left:25vw; top:6vh; background:var(--a3); opacity:.7; animation:f1 18s ease-in-out infinite reverse; }
  @keyframes f1{ 50%{ transform:translate(6vw,4vh) scale(1.15);} }
  @keyframes f2{ 50%{ transform:translate(-5vw,5vh) scale(1.1);} }
  .grain{ position:fixed; inset:0; z-index:-1; background:radial-gradient(120% 80% at 50% -10%, transparent 40%, rgba(0,0,0,.55)); }

  .wrap{ max-width:560px; margin:0 auto; padding:20px 16px calc(28px + env(safe-area-inset-bottom)); }
  .top{ display:flex; align-items:center; justify-content:space-between; margin:6px 4px 8px; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand .dot{ width:34px;height:34px;border-radius:11px;
    background:linear-gradient(135deg,var(--a1),var(--a2)); display:grid; place-items:center; font-size:18px;
    box-shadow:0 8px 24px rgba(109,94,252,.45); }
  .brand h1{ font-size:18px; font-weight:700; letter-spacing:.2px; }
  .brand .s{ font-size:11.5px; color:var(--dim); margin-top:1px; }
  .pill{ font-size:11px; color:var(--dim); background:var(--glass); border:1px solid var(--glass-bd);
    padding:6px 11px; border-radius:999px; backdrop-filter:blur(12px); }
  .pill b{ color:#39e0a0; }

  /* ГОЛОСОВОЙ ОРБ */
  .voice{ display:grid; place-items:center; margin:18px 0 8px; }
  .orb-btn{ position:relative; width:170px; height:170px; border:none; background:none; cursor:pointer; }
  .orb{ position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #b9b3ff 0%, var(--a1) 35%, #2a1f7a 75%, #120a3a 100%);
    box-shadow:0 18px 60px rgba(109,94,252,.55), inset 0 0 40px rgba(255,255,255,.18);
    animation:breathe 4.5s ease-in-out infinite; transition:transform .2s; }
  .orb::after{ content:""; position:absolute; inset:14px; border-radius:50%;
    background:radial-gradient(circle at 60% 65%, rgba(17,211,255,.55), transparent 60%); mix-blend-mode:screen; }
  .ring{ position:absolute; inset:0; border-radius:50%; border:2px solid rgba(109,94,252,.5); opacity:0; }
  .orb-btn:active .orb{ transform:scale(.96); }
  .orb-ico{ position:absolute; inset:0; display:grid; place-items:center; font-size:46px; filter:drop-shadow(0 4px 10px rgba(0,0,0,.4)); }
  @keyframes breathe{ 50%{ transform:scale(1.05);} }
  @keyframes ping{ 0%{ transform:scale(1); opacity:.7;} 100%{ transform:scale(1.8); opacity:0;} }
  .voice.live .ring{ animation:ping 1.6s ease-out infinite; }
  .voice.live .ring:nth-child(2){ animation-delay:.5s; } .voice.live .ring:nth-child(3){ animation-delay:1s; }
  .voice.live .orb{ animation:breathe 1.1s ease-in-out infinite; }
  .vlabel{ margin-top:16px; font-size:14.5px; color:var(--dim); text-align:center; min-height:20px; transition:.2s; }
  .vlabel b{ color:var(--txt); }

  /* плитки */
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
  .tile{ position:relative; background:var(--glass); border:1px solid var(--glass-bd); border-radius:20px;
    padding:16px; text-align:left; color:var(--txt); cursor:pointer; backdrop-filter:blur(16px);
    transition:transform .12s, background .2s, border-color .2s; overflow:hidden; }
  .tile:active{ transform:scale(.97); background:rgba(255,255,255,.1); }
  .tile .ic{ font-size:24px; display:block; margin-bottom:9px; }
  .tile .t{ font-size:14.5px; font-weight:650; }
  .tile .d{ font-size:11px; color:var(--dim); margin-top:3px; }
  .tile::before{ content:""; position:absolute; right:-30px; top:-30px; width:90px; height:90px; border-radius:50%;
    background:linear-gradient(135deg,var(--a1),var(--a2)); opacity:.16; }

  /* модалки */
  .sheet{ position:fixed; inset:0; z-index:20; display:none; align-items:flex-end; justify-content:center;
    background:rgba(0,0,0,.5); backdrop-filter:blur(4px); }
  .sheet.on{ display:flex; }
  .card{ width:100%; max-width:560px; background:#0d1422; border:1px solid var(--glass-bd);
    border-radius:24px 24px 0 0; padding:20px 18px calc(22px + env(safe-area-inset-bottom));
    animation:up .25s cubic-bezier(.2,.8,.2,1); }
  @keyframes up{ from{ transform:translateY(40px); opacity:.4;} }
  .card h3{ font-size:17px; margin-bottom:14px; display:flex; justify-content:space-between; }
  .card .x{ color:var(--dim); cursor:pointer; }
  .fld{ width:100%; background:#0a0f1a; border:1px solid var(--glass-bd); color:var(--txt);
    border-radius:14px; padding:13px; font-size:15px; margin-bottom:10px; font-family:inherit; }
  .go{ width:100%; border:none; border-radius:14px; padding:14px; font-size:15.5px; font-weight:700; color:#fff;
    background:linear-gradient(135deg,var(--a1),var(--a2)); cursor:pointer; box-shadow:0 10px 30px rgba(109,94,252,.4); }
  .go:active{ opacity:.9; }
  .foot{ text-align:center; color:var(--dim); font-size:11px; margin-top:20px; line-height:1.6; }
</style>
</head>
<body>
<div class="aurora"><i></i><i></i><i></i></div><div class="grain"></div>

<div class="wrap">
  <div class="top">
    <div class="brand">
      <div class="dot">🤖</div>
      <div><h1>Хермес</h1><div class="s" id="who">твой ассистент</div></div>
    </div>
    <div class="pill">Бот <b>•</b> онлайн</div>
  </div>

  <!-- голосовой режим -->
  <div class="voice" id="voice">
    <button class="orb-btn" id="orb" onclick="toggleVoice()">
      <span class="ring"></span><span class="ring"></span><span class="ring"></span>
      <span class="orb"></span>
      <span class="orb-ico" id="orbico">🎙️</span>
    </button>
  </div>
  <div class="vlabel" id="vlabel">Нажми и говори — как голосовой чат</div>

  <div class="grid">
    <button class="tile" onclick="sheet('remind')"><span class="ic">⏰</span><div class="t">Напомнить</div><div class="d">в срок, сам пришлёт</div></button>
    <button class="tile" onclick="sheet('note')"><span class="ic">🗄️</span><div class="t">В архив</div><div class="d">сохранить заметку</div></button>
    <button class="tile" onclick="sheet('search')"><span class="ic">🔍</span><div class="t">Поиск</div><div class="d">архив и интернет</div></button>
    <button class="tile" onclick="cmd('журналы')"><span class="ic">📚</span><div class="t">Журналы</div><div class="d">прислать все</div></button>
    <button class="tile" onclick="cmd('статус')"><span class="ic">📊</span><div class="t">Статус</div><div class="d">диск · память · бот</div></button>
    <button class="tile" onclick="cmd('что ты помнишь')"><span class="ic">🧠</span><div class="t">Память</div><div class="d">что бот знает</div></button>
  </div>

  <div class="foot">🔐 Приватно: данные не уходят на сервер — всё через твоего бота.<br>Распознавание речи — прямо в телефоне.</div>
</div>

<!-- модалки -->
<div class="sheet" id="s-remind"><div class="card"><h3>⏰ Напоминание <span class="x" onclick="closeSheets()">✕</span></h3>
  <input class="fld" id="r1" placeholder="когда: через 10 минут / в 15:30 / завтра в 9">
  <input class="fld" id="r2" placeholder="о чём напомнить">
  <button class="go" onclick="sendRemind()">Поставить</button></div></div>
<div class="sheet" id="s-note"><div class="card"><h3>🗄️ В архив <span class="x" onclick="closeSheets()">✕</span></h3>
  <textarea class="fld" id="n1" rows="3" placeholder="заметка — бот сам определит раздел"></textarea>
  <button class="go" onclick="sendNote()">Сохранить</button></div></div>
<div class="sheet" id="s-search"><div class="card"><h3>🔍 Поиск <span class="x" onclick="closeSheets()">✕</span></h3>
  <input class="fld" id="q1" placeholder="что найти (архив или интернет)">
  <button class="go" onclick="sendSearch()">Искать</button></div></div>

<script>
  var tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg){ tg.ready(); tg.expand(); try{ tg.setHeaderColor('#070b14'); tg.setBackgroundColor('#070b14'); }catch(e){} }
  try{ var u=tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user; if(u) document.getElementById('who').textContent='привет, '+(u.first_name||'братан'); }catch(e){}

  function haptic(t){ try{ tg.HapticFeedback.impactOccurred(t||'light'); }catch(e){} }
  function send(o){ haptic('medium'); if(tg&&tg.sendData) tg.sendData(JSON.stringify(o)); else alert('Открой через Telegram'); }
  function cmd(t){ send({type:'cmd',text:t}); }
  function sheet(id){ closeSheets(); document.getElementById('s-'+id).classList.add('on'); haptic('light'); }
  function closeSheets(){ document.querySelectorAll('.sheet').forEach(function(s){ s.classList.remove('on'); }); }
  function sendRemind(){ var w=r1.value.trim(),t=r2.value.trim(); if(!w||!t)return; send({type:'cmd',text:'напомни '+w+' '+t}); }
  function sendNote(){ var t=n1.value.trim(); if(!t)return; send({type:'cmd',text:'в архив: '+t}); }
  function sendSearch(){ var q=q1.value.trim(); if(!q)return; send({type:'cmd',text:q}); }

  /* ===== ГОЛОСОВОЙ ЧАТ (распознавание прямо в браузере, без ключей) ===== */
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var rec=null, listening=false;
  var voiceEl=document.getElementById('voice'), label=document.getElementById('vlabel'), ico=document.getElementById('orbico');
  function setLabel(h){ label.innerHTML=h; }
  function toggleVoice(){
    if(!SR){ setLabel('Голос недоступен в этом окне.<br>Запиши голосовое боту — он поймёт.'); haptic('rigid'); return; }
    if(listening){ stopVoice(); return; }
    rec = new SR(); rec.lang='ru-RU'; rec.interimResults=true; rec.continuous=false;
    listening=true; voiceEl.classList.add('live'); ico.textContent='⏺️'; setLabel('<b>Слушаю…</b> говори'); haptic('medium');
    var finalT='';
    rec.onresult=function(e){ var t=''; for(var i=e.resultIndex;i<e.results.length;i++){ t+=e.results[i][0].transcript; if(e.results[i].isFinal) finalT+=e.results[i][0].transcript; } setLabel('«'+(t||'…')+'»'); };
    rec.onerror=function(e){ setLabel('Не расслышал ('+e.error+'). Попробуй ещё.'); stopVoice(); };
    rec.onend=function(){ listening=false; voiceEl.classList.remove('live'); ico.textContent='🎙️';
      var txt=(finalT||'').trim();
      if(txt){ setLabel('Отправил: «'+txt+'»'); send({type:'cmd',text:txt}); }
      else setLabel('Нажми и говори — как голосовой чат'); };
    try{ rec.start(); }catch(e){ stopVoice(); }
  }
  function stopVoice(){ try{ rec&&rec.stop(); }catch(e){} listening=false; voiceEl.classList.remove('live'); ico.textContent='🎙️'; }
</script>
</body>
</html>
